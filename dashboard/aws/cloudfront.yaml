AWSTemplateFormatVersion: '2010-09-09'
Description: 'Gasclaw Management Dashboard - CloudFront Distribution for status.gpu.villamarket.ai'

Parameters:
  DomainName:
    Type: String
    Default: status.gpu.villamarket.ai
    Description: Domain name for the dashboard
  
  OriginDomain:
    Type: String
    Description: Origin server domain/IP (the GPU server)
    Default: api.minimax.villamarket.ai
  
  OriginPort:
    Type: Number
    Default: 5000
    Description: Port the dashboard API runs on
  
  CertificateArn:
    Type: String
    Description: ACM Certificate ARN for the domain (must be in us-east-1)

Resources:
  # CloudFront Distribution
  DashboardDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub 'Gasclaw Management Dashboard - ${DomainName}'
        DefaultRootObject: index.html
        
        Aliases:
          - !Ref DomainName
        
        Origins:
          - Id: DashboardOrigin
            DomainName: !Ref OriginDomain
            OriginCustomHeaders:
              - HeaderName: X-Forwarded-Host
                HeaderValue: !Ref DomainName
            CustomOriginConfig:
              HTTPPort: !Ref OriginPort
              OriginProtocolPolicy: http-only
              OriginReadTimeout: 30
              OriginKeepaliveTimeout: 5
        
        DefaultCacheBehavior:
          TargetOriginId: DashboardOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
          CachePolicyId: !Ref DashboardCachePolicy
          OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3
          Compress: true
        
        # Cache behaviors for API (no caching)
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: DashboardOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachedMethods:
              - GET
              - HEAD
            CachePolicyId: !Ref APICachePolicy
            OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3
            Compress: true
        
        PriceClass: PriceClass_100
        
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        
        HttpVersion: http2and3

  # Custom Cache Policy for Dashboard (cache static assets)
  DashboardCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub '${AWS::StackName}-dashboard-cache'
        Comment: 'Cache policy for dashboard static assets'
        DefaultTTL: 60
        MaxTTL: 3600
        MinTTL: 1
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          HeadersConfig:
            HeaderBehavior: none
          CookiesConfig:
            CookieBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  # Cache Policy for API (no caching)
  APICachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub '${AWS::StackName}-api-cache'
        Comment: 'No-cache policy for API endpoints'
        DefaultTTL: 0
        MaxTTL: 1
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          HeadersConfig:
            HeaderBehavior: none
          CookiesConfig:
            CookieBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: all

Outputs:
  DistributionId:
    Description: CloudFront Distribution ID
    Value: !Ref DashboardDistribution
  
  DistributionDomain:
    Description: CloudFront Domain Name
    Value: !GetAtt DashboardDistribution.DomainName
  
  DashboardURL:
    Description: Dashboard URL
    Value: !Sub 'https://${DomainName}'
