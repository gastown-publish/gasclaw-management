AWSTemplateFormatVersion: '2010-09-09'
Description: 'Gasclaw Management Dashboard - CloudFront Distribution for status.gpu.villamarket.ai'

Parameters:
  DomainName:
    Type: String
    Default: status.gpu.villamarket.ai
    Description: Domain name for the dashboard
  
  OriginDomain:
    Type: String
    Description: Origin server domain/IP (the GPU server)
    Default: api.minimax.villamarket.ai
  
  OriginPort:
    Type: Number
    Default: 5000
    Description: Port the dashboard API runs on
  
  CertificateArn:
    Type: String
    Description: ACM Certificate ARN for the domain
    Default: ''

Conditions:
  HasCustomCert: !Not [!Equals [!Ref CertificateArn, '']]

Resources:
  # CloudFront Origin Access Identity (if needed for S3)
  OriginAccessIdentity:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub 'OAI for ${DomainName}'

  # CloudFront Distribution
  DashboardDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub 'Gasclaw Management Dashboard - ${DomainName}'
        DefaultRootObject: index.html
        
        Aliases:
          - !Ref DomainName
        
        Origins:
          - Id: DashboardOrigin
            DomainName: !Ref OriginDomain
            CustomOriginConfig:
              HTTPPort: !Ref OriginPort
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
            CustomHeaders:
              - HeaderName: X-Forwarded-Host
                HeaderValue: !Ref DomainName
        
        DefaultCacheBehavior:
          TargetOriginId: DashboardOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachePolicyId: !Ref DashboardCachePolicy
          OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3  # Managed AllViewer policy
          ResponseHeadersPolicyId: 67f7725c-6f97-4210-82d7-5512b31e9d03  # Managed CORS with prefetch
          Compress: true
        
        # Cache behaviors for API (no caching)
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: DashboardOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachePolicyId: !Ref APICachePolicy
            OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3
            Compress: true
        
        PriceClass: PriceClass_100
        
        ViewerCertificate:
          !If
            - HasCustomCert
            - AcmCertificateArn: !Ref CertificateArn
              SslSupportMethod: sni-only
              MinimumProtocolVersion: TLSv1.2_2021
            - CloudFrontDefaultCertificate: true
        
        HttpVersion: http2and3
        
        # Security headers
        Restrictions:
          GeoRestriction:
            RestrictionType: none

  # Custom Cache Policy for Dashboard (cache static assets)
  DashboardCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub '${AWS::StackName}-dashboard-cache'
        Comment: 'Cache policy for dashboard static assets'
        DefaultTTL: 86400  # 1 day
        MaxTTL: 604800     # 1 week
        MinTTL: 1
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          HeadersConfig:
            HeaderBehavior: whitelist
            Headers:
              - Origin
              - Access-Control-Request-Headers
              - Access-Control-Request-Method
          CookiesConfig:
            CookieBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  # Cache Policy for API (no caching)
  APICachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub '${AWS::StackName}-api-cache'
        Comment: 'No-cache policy for API endpoints'
        DefaultTTL: 0
        MaxTTL: 0
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          HeadersConfig:
            HeaderBehavior: whitelist
            Headers:
              - Origin
              - Access-Control-Request-Headers
              - Access-Control-Request-Method
              - Authorization
          CookiesConfig:
            CookieBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: all

  # Route53 Record (if using Route53)
  DashboardDNSRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasCustomCert
    Properties:
      HostedZoneName: villamarket.ai.
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt DashboardDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront hosted zone ID
        EvaluateTargetHealth: false

Outputs:
  DistributionId:
    Description: CloudFront Distribution ID
    Value: !Ref DashboardDistribution
  
  DistributionDomain:
    Description: CloudFront Domain Name
    Value: !GetAtt DashboardDistribution.DomainName
  
  DashboardURL:
    Description: Dashboard URL
    Value: !Sub 'https://${DomainName}'
